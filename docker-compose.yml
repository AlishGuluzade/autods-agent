services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-70b-versatile}
      - UPLOAD_DIR=/tmp/autods_uploads
      - ARTIFACTS_DIR=/tmp/autods_artifacts
    volumes:
      - autods_data:/tmp

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://backend:8000

volumes:
  autods_data:
